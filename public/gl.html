<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>General Ledger - SAP B1</title>
<link rel="stylesheet" href="/theme.css"/>
<style>
:root{
  --je-bg:#f4f7fb;--je-surface:#ffffff;--je-panel:#f9fbfd;--je-ink:#172536;--je-muted:#637386;
  --je-border:#dbe4ee;--je-blue:#0a6ed1;--je-teal:#047e7e;--je-green:#137333;--je-red:#b3261e;
  --je-warn:#a15c00;--je-green-bg:#e8f5ee;--je-red-bg:#fdecea;--je-shadow:0 10px 26px rgba(22,41,72,.08);
}
*{box-sizing:border-box}
body{margin:0;background:var(--je-bg);color:var(--je-ink);font-family:Inter,Arial,Helvetica,sans-serif}
.je-page{width:min(1480px,100%);margin:0 auto;padding:26px}
.je-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:16px}
.eyebrow{display:block;margin-bottom:8px;color:var(--je-teal);font-size:12px;font-weight:900;text-transform:uppercase}
.je-title h1{margin:0 0 7px;font-size:34px;line-height:1.08;font-weight:850;color:var(--je-ink)}
.je-title p{margin:0;color:var(--je-muted);font-size:16px;line-height:1.45;max-width:740px}
.status-stack{display:flex;flex-direction:column;align-items:flex-end;gap:8px;min-width:240px}
.pill{display:inline-flex;align-items:center;justify-content:center;min-height:32px;padding:8px 12px;border-radius:7px;border:1px solid var(--je-border);background:#fff;color:var(--je-muted);font-size:13px;font-weight:850}
.pill.ok{border-color:#b9dfc9;background:#f0faf4;color:var(--je-green)}
.pill.warn{border-color:#f0d19f;background:#fff8ec;color:var(--je-warn)}
.pill.bad{border-color:#f1b8b5;background:#fff7f7;color:var(--je-red)}
.je-panel{background:var(--je-surface);border:1px solid var(--je-border);border-radius:8px;box-shadow:var(--je-shadow)}
.je-filters{padding:16px;margin-bottom:16px}
.filter-grid{display:grid;grid-template-columns:1.2fr 1.6fr 1fr 1fr .8fr;gap:12px;align-items:end}
.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.field label{font-size:12px;font-weight:900;color:#34465e;text-transform:uppercase}
.field input,.field select{width:100%;height:42px;border:1px solid var(--je-border);border-radius:7px;background:#fff;color:var(--je-ink);font:700 14px/1.2 Inter,Arial,sans-serif;padding:9px 11px;outline:none}
.field input:focus,.field select:focus{border-color:var(--je-blue);box-shadow:0 0 0 3px rgba(10,110,209,.12)}
.field input::placeholder{color:#99a6b6;font-weight:600}
.acct-field{position:relative}
.acct-results{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:60;max-height:340px;overflow-y:auto;background:#fff;border:1px solid var(--je-border);border-radius:8px;box-shadow:var(--je-shadow)}
.acct-results .opt{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid #eef2f7}
.acct-results .opt:last-child{border-bottom:0}
.acct-results .opt:hover,.acct-results .opt.active{background:#eef6ff}
.acct-results .opt .code{font-family:"SFMono-Regular",Consolas,monospace;font-weight:850;color:var(--je-ink);white-space:nowrap}
.acct-results .opt .nm{flex:1;min-width:0;color:#46566a;font-size:13px;font-weight:650;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.acct-results .badge{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;padding:3px 7px;border-radius:5px;white-space:nowrap}
.acct-results .badge.gl{background:#e8f0fb;color:var(--je-blue)}
.acct-results .badge.vendor{background:#fdecea;color:var(--je-red)}
.acct-results .badge.customer{background:#e8f5ee;color:var(--je-green)}
.acct-results .badge.bp{background:#eef2f7;color:var(--je-muted)}
.acct-results .none{padding:14px 12px;color:var(--je-muted);font-size:13px;text-align:center}
.filter-actions{display:flex;align-items:center;justify-content:flex-end;gap:10px;grid-column:1 / -1;margin-top:12px}
.btn{height:42px;border-radius:7px;border:1px solid var(--je-border);padding:0 16px;background:#fff;color:var(--je-ink);font:850 14px/1 Inter,Arial,sans-serif;cursor:pointer;white-space:nowrap}
.btn.primary{background:var(--je-teal);border-color:var(--je-teal);color:#fff}
.btn:hover:not(:disabled){border-color:var(--je-teal)}
.btn.primary:hover:not(:disabled){background:#036b6b}
.btn:disabled{opacity:.55;cursor:not-allowed}
.summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px}
.summary-card{padding:16px;background:var(--je-surface);border:1px solid var(--je-border);border-radius:8px}
.summary-card span{display:block;color:var(--je-muted);font-size:12px;font-weight:900;margin-bottom:8px;text-transform:uppercase}
.summary-card strong{display:block;color:var(--je-ink);font-size:23px;line-height:1.1;font-weight:900;font-variant-numeric:tabular-nums;word-break:break-word}
.summary-card.debit strong{color:var(--je-green)}
.summary-card.credit strong{color:var(--je-red)}
.summary-card.bal strong{color:var(--je-blue)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:1100px}
th{position:sticky;top:0;background:#eef3f8;color:#34465e;text-align:left;font-size:11px;text-transform:uppercase;font-weight:900;padding:11px 10px;border-bottom:1px solid var(--je-border);white-space:nowrap}
td{padding:11px 10px;border-bottom:1px solid var(--je-border);font-size:14px;line-height:1.35;vertical-align:top;color:var(--je-ink)}
tbody tr:last-child td{border-bottom:0}
tbody tr:hover td{background:#fbfdff}
.mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace;font-weight:750}
.num{text-align:right;font-variant-numeric:tabular-nums}
.debit-cell{color:var(--je-green);font-weight:900}
.credit-cell{color:var(--je-red);font-weight:900}
.bal-cell{font-weight:900;font-variant-numeric:tabular-nums}
.muted{color:#8a96a5}
.empty,.error{background:#fff;border:1px solid var(--je-border);border-radius:8px;padding:28px;text-align:center;color:var(--je-muted);font-size:16px}
.error{border-color:#f1b8b5;color:var(--je-red);background:#fff7f7}
.loading{display:flex;align-items:center;justify-content:center;gap:10px}
.spinner{width:18px;height:18px;border-radius:50%;border:3px solid #d5e1ee;border-top-color:var(--je-teal);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:1280px){.filter-grid{grid-template-columns:repeat(2,1fr)}.summary-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){
  .je-page{padding:18px 14px 90px}.je-head{display:block}.je-title h1{font-size:29px}
  .status-stack{align-items:flex-start;min-width:0;margin-top:12px}
  .filter-grid{grid-template-columns:1fr}.filter-actions{justify-content:stretch;flex-direction:column}
  .btn{width:100%}.summary-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<main class="je-page">
  <header class="je-head">
    <div class="je-title">
      <span class="eyebrow">Finance</span>
      <h1>General Ledger</h1>
      <p>Account statement for any G/L account or business partner — live SAP postings (JDT1 / OJDT) with a running balance.</p>
    </div>
    <div class="status-stack">
      <span class="pill" id="status">Ready</span>
    </div>
  </header>

  <section class="je-panel je-filters" aria-label="Ledger filters">
    <div class="filter-grid">
      <div class="field">
        <label for="company">Company</label>
        <select id="company">
          <option value="JIVO_OIL_HANADB">Jivo Oil</option>
          <option value="JIVO_BEVERAGES_HANADB">Jivo Beverages</option>
          <option value="JIVO_MART_HANADB">Jivo Mart</option>
          <option value="TEST_OIL_15122025">Test Oil</option>
        </select>
      </div>
      <div class="field acct-field">
        <label for="account">Omni-search</label>
        <input id="account" type="text" autocomplete="off" placeholder="Search G/L accounts, vendors &amp; customers by code or name…"/>
        <div id="acctResults" class="acct-results" hidden></div>
      </div>
      <div class="field">
        <label for="fromDate">From Date</label>
        <input id="fromDate" type="date"/>
      </div>
      <div class="field">
        <label for="toDate">To Date</label>
        <input id="toDate" type="date"/>
      </div>
      <div class="field">
        <label for="limit">Rows</label>
        <input id="limit" type="number" min="1" max="1000" value="200"/>
      </div>
      <div class="filter-actions">
        <button class="btn" id="resetBtn" type="button">Reset</button>
        <button class="btn primary" id="loadBtn" type="button">Load Ledger</button>
      </div>
    </div>
  </section>

  <section class="summary-grid" id="summary" style="display:none"></section>
  <section class="je-panel" id="ledger"><div class="empty" style="border:0;box-shadow:none">Pick a company and a G/L account, then press <b>Load Ledger</b>.</div></section>
</main>

<script>
'use strict';
const API_BASE = `${window.location.origin}/api/sap`;
const COMPANY_LABELS = {
  JIVO_OIL_HANADB:'Jivo Oil', JIVO_BEVERAGES_HANADB:'Jivo Beverages',
  JIVO_MART_HANADB:'Jivo Mart', TEST_OIL_15122025:'Test Oil',
};
const TRANS_TYPES = {
  '-3':'Closing Balance','-2':'Opening Balance','13':'AR Invoice','14':'AR Credit Memo','15':'Delivery',
  '16':'Return','18':'AP Invoice','19':'AP Credit Memo','20':'Goods Receipt PO','21':'Goods Return',
  '22':'Purchase Order','24':'Incoming Payment','25':'Deposit','30':'Journal Entry','46':'Outgoing Payment',
  '59':'Goods Receipt','60':'Goods Issue','67':'Inventory Transfer','69':'Landed Costs',
  '162':'Inventory Revaluation','202':'Production Order',
};
let state = { loading:false, data:null, error:'' };

function byId(id){ return document.getElementById(id); }
function esc(v){
  return (v===undefined||v===null?'':String(v))
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function getStoredToken(){
  try{ return sessionStorage.getItem('portal_token')||localStorage.getItem('token')||localStorage.getItem('portal_token')||''; }
  catch(_e){ return ''; }
}
function getStoredUser(){
  try{ const raw=sessionStorage.getItem('portal_user')||localStorage.getItem('portal_user')||''; return raw?JSON.parse(raw):null; }
  catch(_e){ return null; }
}
function hasModuleAccess(user){
  if(!user) return true;
  if(user.role==='admin'||user.role==='sap_adder') return true;
  return !Array.isArray(user.modules)||user.modules.includes('journal-entries')||user.modules.includes('sap-approvals');
}
function setStatus(text, kind){ const el=byId('status'); el.textContent=text; el.className='pill'+(kind?` ${kind}`:''); }
function amount(v){ return Number(v||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function dateText(v){
  if(!v) return '-';
  const d=new Date(v);
  if(Number.isNaN(d.getTime())) return String(v);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function typeText(v){ const k=String(v||'').trim(); if(!k) return '-'; return TRANS_TYPES[k]?`${k} - ${TRANS_TYPES[k]}`:k; }
function authHeaders(){
  const h={'Accept':'application/json'};
  const t=getStoredToken();
  if(t) h.Authorization=`Bearer ${t}`;
  return h;
}

// ── Omni-search dropdown (G/L accounts + vendors + customers) ───────────────
let acctTimer=null, acctResults=[], acctActive=-1, acctReqId=0;
function badgeClass(kind){
  const k=String(kind||'').toLowerCase();
  if(k==='vendor') return 'vendor';
  if(k==='customer') return 'customer';
  if(k==='g/l'||k==='gl') return 'gl';
  return 'bp';
}
function closeAcct(){ const box=byId('acctResults'); box.hidden=true; box.innerHTML=''; acctResults=[]; acctActive=-1; }
function renderAcct(loading){
  const box=byId('acctResults');
  if(loading){ box.hidden=false; box.innerHTML='<div class="none">Searching…</div>'; return; }
  if(!acctResults.length){ box.hidden=false; box.innerHTML='<div class="none">No matching accounts or business partners.</div>'; return; }
  box.hidden=false;
  box.innerHTML=acctResults.map((a,i)=>`
    <div class="opt${i===acctActive?' active':''}" data-i="${i}">
      <span class="code">${esc(a.code)}</span>
      <span class="nm">${esc(a.name)}</span>
      <span class="badge ${badgeClass(a.kind)}">${esc(a.kind||'BP')}</span>
    </div>`).join('');
}
function pickAcct(i){
  const a=acctResults[i]; if(!a) return;
  byId('account').value=a.code; closeAcct(); loadLedger();
}
function onAccountInput(){
  clearTimeout(acctTimer);
  const q=byId('account').value.trim();
  if(q.length<2){ closeAcct(); return; }
  const reqId=++acctReqId;
  renderAcct(true);
  acctTimer=setTimeout(async()=>{
    try{
      const url=`${API_BASE}/lookup/gl-search?q=${encodeURIComponent(q)}&company=${encodeURIComponent(byId('company').value)}`;
      const res=await fetch(url,{headers:authHeaders()});
      const data=await res.json().catch(()=>({}));
      if(reqId!==acctReqId) return;         // a newer keystroke already fired
      acctResults=(data.data||[]); acctActive=-1; renderAcct(false);
    }catch(_e){ if(reqId===acctReqId) closeAcct(); }
  },200);
}
function onAccountKey(e){
  const open=!byId('acctResults').hidden && acctResults.length;
  if(e.key==='ArrowDown' && open){ e.preventDefault(); acctActive=(acctActive+1)%acctResults.length; renderAcct(false); }
  else if(e.key==='ArrowUp' && open){ e.preventDefault(); acctActive=(acctActive-1+acctResults.length)%acctResults.length; renderAcct(false); }
  else if(e.key==='Enter'){ if(open && acctActive>=0){ e.preventDefault(); pickAcct(acctActive); } else { closeAcct(); loadLedger(); } }
  else if(e.key==='Escape'){ closeAcct(); }
}

async function fetchLedger(){
  const account=byId('account').value.trim();
  if(!account) throw new Error('Enter a G/L account or BP code.');
  const params=new URLSearchParams();
  params.set('company',byId('company').value);
  params.set('account',account);
  params.set('top',byId('limit').value||'200');
  const from=byId('fromDate').value, to=byId('toDate').value;
  if(from) params.set('dateFrom',from);
  if(to) params.set('dateTo',to);
  const res=await fetch(`${API_BASE}/gl-ledger?${params.toString()}`,{headers:authHeaders()});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.message||`HTTP ${res.status}`);
  if(!data.success) throw new Error(data.message||'Request failed');
  return data.data||{};
}

function renderSummary(d){
  const sum=byId('summary');
  if(!d||!d.lines){ sum.style.display='none'; return; }
  const totalDebit=d.lines.reduce((s,l)=>s+Number(l.debit||0),0);
  const totalCredit=d.lines.reduce((s,l)=>s+Number(l.credit||0),0);
  sum.style.display='';
  sum.innerHTML=`
    <div class="summary-card"><span>Account</span><strong>${esc(d.account||'-')}</strong></div>
    <div class="summary-card"><span>${esc(d.name||'Account name')}</span><strong>${d.total||d.lines.length} postings</strong></div>
    <div class="summary-card bal"><span>Current Balance (${esc(d.currency||'INR')})</span><strong>${amount(d.balance)}</strong></div>
    <div class="summary-card debit"><span>Total Debit (shown)</span><strong>${amount(totalDebit)}</strong></div>
    <div class="summary-card credit"><span>Total Credit (shown)</span><strong>${amount(totalCredit)}</strong></div>`;
}

function renderLedger(){
  const root=byId('ledger');
  if(state.loading){ root.innerHTML='<div class="empty loading" style="border:0;box-shadow:none"><span class="spinner"></span><span>Loading ledger…</span></div>'; return; }
  if(state.error){ root.innerHTML=`<div class="error">${esc(state.error)}</div>`; return; }
  const d=state.data;
  if(!d||!d.lines){ root.innerHTML='<div class="empty" style="border:0;box-shadow:none">Pick a company and a G/L account, then press <b>Load Ledger</b>.</div>'; return; }
  if(!d.lines.length){ root.innerHTML='<div class="empty" style="border:0;box-shadow:none">No postings found for this account / filter.</div>'; return; }
  const capped=(d.total||0)>d.lines.length;
  root.innerHTML=`
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Posting Date</th><th>Due Date</th><th>Doc Date</th><th>Trans No</th>
          <th>SAP Type</th><th>Ref / Base</th><th>Bill No</th><th>Memo</th>
          <th class="num">Debit</th><th class="num">Credit</th><th class="num">Balance</th>
        </tr></thead>
        <tbody>
          ${d.lines.map(l=>{
            const debit=Number(l.debit||0), credit=Number(l.credit||0);
            return `<tr>
              <td>${dateText(l.date)}</td>
              <td>${dateText(l.dueDate)}</td>
              <td>${dateText(l.docDate)}</td>
              <td class="mono">${esc(l.transId||'-')}</td>
              <td>${esc(typeText(l.type))}</td>
              <td class="mono">${esc(l.ref||'-')}</td>
              <td class="mono">${esc(l.billNo||'-')}</td>
              <td>${esc(l.memo||'-')}</td>
              <td class="num ${debit>0?'debit-cell':'muted'}">${debit>0?amount(debit):'-'}</td>
              <td class="num ${credit>0?'credit-cell':'muted'}">${credit>0?amount(credit):'-'}</td>
              <td class="num bal-cell">${amount(l.balance)}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    ${capped?`<div class="memo" style="padding:11px 16px;color:var(--je-warn);font-weight:800">Showing the latest ${d.lines.length} of ${d.total} postings. Narrow the date range or raise the row limit to see more.</div>`:''}`;
}

function render(){ renderSummary(state.data); renderLedger(); }

async function loadLedger(){
  state.loading=true; state.error='';
  byId('loadBtn').disabled=true; setStatus('Loading',''); render();
  try{
    if(!getStoredToken()) throw new Error('Please sign in to the portal.');
    const data=await fetchLedger();
    state.data=data;
    setStatus(`${data.lines?data.lines.length:0} postings`,'ok');
  }catch(e){
    state.data=null; state.error=e.message||'Unable to load ledger';
    setStatus('Load failed','bad');
  }finally{
    state.loading=false; byId('loadBtn').disabled=false; render();
  }
}

function resetFilters(){
  byId('account').value=''; byId('fromDate').value=''; byId('toDate').value='';
  byId('limit').value='200'; closeAcct();
  state.data=null; state.error=''; setStatus('Ready',''); render();
}

function init(){
  byId('company').value=localStorage.getItem('gl_company')||'JIVO_OIL_HANADB';
  byId('company').addEventListener('change',()=>localStorage.setItem('gl_company',byId('company').value));
  byId('account').addEventListener('input',onAccountInput);
  byId('account').addEventListener('keydown',onAccountKey);
  byId('account').addEventListener('focus',()=>{ if(acctResults.length) renderAcct(false); });
  byId('acctResults').addEventListener('mousedown',e=>{
    const opt=e.target.closest('.opt'); if(!opt) return;
    e.preventDefault(); pickAcct(Number(opt.dataset.i));
  });
  document.addEventListener('click',e=>{ if(!e.target.closest('.acct-field')) closeAcct(); });
  byId('loadBtn').addEventListener('click',loadLedger);
  byId('resetBtn').addEventListener('click',resetFilters);
  const user=getStoredUser();
  if(!hasModuleAccess(user)){
    state.error='You do not have access to the General Ledger. Ask an admin to enable Journal Entries or SAP Approvals for your user.';
    setStatus('No access','bad'); byId('loadBtn').disabled=true; render(); return;
  }
  render();
}
document.addEventListener('DOMContentLoaded',init);
</script>
<script src="/sidebar.js"></script>
</body>
</html>
